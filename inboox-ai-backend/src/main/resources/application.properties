spring.application.name=inboox-ai-backend

# Port Configuration for Cloud
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI}



# Load secrets
spring.config.import=optional:application-secrets.properties

# JWT Configuration
inbooxai.jwt.secret=${JWT_SECRET}
inbooxai.jwt.expiration=86400000

# Groq AI
groq.api.key=${GROQ_API_KEY}

